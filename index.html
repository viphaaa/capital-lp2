<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
--black: #080808;
--deep: #0d0d0d;
--surface: #141414;
--border: #1e1e1e;
--gold: #c9a84c;
--gold-light: #e8c97a;
--gold-dim: rgba(201,168,76,0.12);
--text: #e8e4dc;
--text-muted: #7a7570;
--text-dim: #3a3730;
}

body {
background: var(--black);
color: var(--text);
font-family: 'DM Mono', monospace;
overflow-x: hidden;
}

/* NAV */
nav {
position: fixed;
top: 0;
width: 100%;
display: flex;
justify-content: space-between;
padding: 20px 40px;
z-index: 100;
background: rgba(0,0,0,0.6);
backdrop-filter: blur(10px);
}

.logo {

color: var(--gold);
font-size: 20px;
}

.nav-cta {
background: var(--gold);
color: black;
padding: 10px 20px;
text-decoration: none;
}

/* HERO */
.hero {
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
min-height: 100vh;
text-align: center;
padding: 40px;
}

h1 {
font-family: 'Cormorant Garamond', serif;
font-size: 60px;
margin-bottom: 20px;
}

.hero-desc {
max-width: 500px;
margin-bottom: 30px;
}

.btn-primary {
background: var(--gold);
color: black;
padding: 15px 30px;
text-decoration: none;
}

/* CTA */
.cta {
padding: 80px 20px;
text-align: center;
background: var(--gold);
color: black;
}

.cta a {
background: black;
color: var(--gold);
padding: 15px 30px;
text-decoration: none;
display: inline-block;
margin-top: 20px;
}
</style>
</head>

<body>
